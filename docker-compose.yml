services:
  web:
    build: .
    ports:
      - "80:8080"    # Access at http://localhost (port 80 = no port needed in URL)
    volumes:
      - aso_data:/app/data
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-}
      - DATA_DIR=/app/data
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,respectaso.private}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://respectaso.private}

volumes:
  aso_data:
