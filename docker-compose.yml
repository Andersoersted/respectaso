services:
  web:
    build: .
    ports:
      - "8088:8080"    # Access at http://localhost:8088
    volumes:
      - aso_data:/app/data
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-}
      - DATA_DIR=/app/data
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,respectaso.private}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://respectaso.private}
      - RESULT_RETENTION_DAYS=${RESULT_RETENTION_DAYS:-365}
      - AUTO_REFRESH_MODE=${AUTO_REFRESH_MODE:-external}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - OPENAI_AVAILABLE_MODELS=${OPENAI_AVAILABLE_MODELS:-gpt-5.2,gpt-5-mini,gpt-5-nano,gpt-5,gpt-4.1-mini,gpt-4.1}
      - OPENAI_TIMEOUT_SECONDS=${OPENAI_TIMEOUT_SECONDS:-40}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-2}
      - AI_MAX_CANDIDATES=${AI_MAX_CANDIDATES:-12}
      - AI_EVALUATED_CANDIDATES=${AI_EVALUATED_CANDIDATES:-8}
      - AI_MAX_COUNTRIES=${AI_MAX_COUNTRIES:-3}
      - AI_HISTORY_ROWS_MAX=${AI_HISTORY_ROWS_MAX:-300}
      - AI_ENABLE_ONLINE_CONTEXT=${AI_ENABLE_ONLINE_CONTEXT:-true}
      - AI_ONLINE_TOP_APPS_PER_COUNTRY=${AI_ONLINE_TOP_APPS_PER_COUNTRY:-20}

volumes:
  aso_data:
